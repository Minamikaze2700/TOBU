<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>運行情報TXT生成ツール</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe2ea;
      --accent: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1.1fr 0.9fr;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }
    .sub { color: var(--muted); margin: 0 0 16px; font-size: 14px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .field { display: grid; gap: 6px; }
    label { font-size: 13px; color: var(--muted); }
    input, select, textarea, button {
      font: inherit;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      background: white;
    }
    input, select, textarea { width: 100%; }
    textarea { min-height: 140px; resize: vertical; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      cursor: pointer;
      border: 0;
      background: var(--accent);
      color: white;
      font-weight: 700;
      padding: 10px 14px;
    }
    .btn.secondary { background: #334155; }
    .btn.danger { background: var(--danger); }
    .btn.ghost {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .small { font-size: 12px; color: var(--muted); }
    .list { display: grid; gap: 12px; margin-top: 12px; }
    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 8px;
    }
    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .item-title { font-weight: 700; }
    .item-meta { color: var(--muted); font-size: 13px; white-space: pre-wrap; word-break: break-word; }
    .preview {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 220px;
    }
    .head-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .muted-box {
      padding: 10px 12px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
      font-size: 13px;
    }
    @media (max-width: 920px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>運行情報TXT生成ツール</h1>
      <p class="sub">複数の情報を追加して、まとめて txt に出力できます。各項目は個別に「解除」できます。</p>

      <div class="grid">
        <div class="field">
          <label for="lineName">路線名</label>
          <input id="lineName" type="text" placeholder="例: 東武伊勢崎線" />
        </div>
        <div class="field">
          <label for="lineNameEn">路線名英語（任意・半角）</label>
          <input id="lineNameEn" type="text" placeholder="例: Tobu Isesaki Line" />
        </div>
        <div class="field">
          <label for="time">時刻（任意）</label>
          <input id="time" type="text" placeholder="例: 8:30" />
        </div>
        <div class="field">
          <label for="status">遅れ・運休等</label>
          <select id="status">
            <option value="delay">遅れがでています / Delay</option>
            <option value="accident">運転を見合わせいます / Accident</option>
            <option value="cancelDelay">運休および遅れがでています / Delay</option>
          </select>
        </div>
        <div class="field">
          <label for="reason">理由（任意）</label>
          <input id="reason" type="text" placeholder="例: 信号トラブル" />
        </div>
        <div class="field">
          <label for="remark">備考（任意）</label>
          <input id="remark" type="text" placeholder="例: 一部列車に影響" />
        </div>
      </div>

      <div class="head-actions">
        <button class="btn" id="addBtn">追加</button>
        <button class="btn ghost" id="clearAllBtn">全解除</button>
        <button class="btn secondary" id="downloadBtn">txtをダウンロード</button>
      </div>

      <div class="muted-box" style="margin-top:12px;">
        英数字は路線名・時刻・理由・備考を自動で全角に変換します。英語欄は半角のままです。
      </div>

      <div class="list" id="list"></div>
    </section>

    <section class="card">
      <h1 style="font-size:20px;">出力プレビュー</h1>
      <p class="sub">この内容が txt になります。</p>
      <textarea id="output" class="preview" readonly></textarea>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'trainDelayGeneratorItems_v1';
    const items = loadItems();

    const el = (id) => document.getElementById(id);
    const listEl = el('list');
    const outputEl = el('output');

    function toFullWidth(str) {
      return String(str ?? '').replace(/[!-~]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0xFEE0)).replace(/ /g, '　');
    }

    function trimSafe(v) {
      return String(v ?? '').trim();
    }

    function buildLine(item) {
      const line = trimSafe(item.lineName);
      const time = trimSafe(item.time);
      const reason = trimSafe(item.reason);
      const remark = trimSafe(item.remark);
      const lineEn = trimSafe(item.lineNameEn);

      const statusJa = {
        delay: '遅れがでています',
        accident: '運転を見合わせいます',
        cancelDelay: '運休および遅れがでています',
      }[item.status] || '遅れがでています';

      const statusEn = {
        delay: 'Delay',
        accident: 'Accident',
        cancelDelay: 'Delay',
      }[item.status] || 'Delay';

      let ja = '';
      if (line) ja += `${line}は`;
      if (time) ja += `${time}頃　`;
      if (reason) ja += `${reason}のため、`;
      ja += `${statusJa}。`;
      if (remark) ja += `${remark}　`;

      const en = `${lineEn}/${statusEn}`;
      return `${ja}${en}`;
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function loadItems() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function render() {
      listEl.innerHTML = '';
      outputEl.value = items.map(buildLine).join('\n');
      if (items.length === 0) {
        listEl.innerHTML = '<div class="small">まだ登録がありません。</div>';
        return;
      }

      items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'item';
        card.innerHTML = `
          <div class="item-top">
            <div>
              <div class="item-title">${escapeHtml(item.lineName || '（路線名なし）')}</div>
              <div class="item-meta">${escapeHtml(buildLine(item))}</div>
            </div>
            <button class="btn danger" data-remove="${idx}">解除</button>
          </div>
        `;
        listEl.appendChild(card);
      });

      listEl.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.remove);
          items.splice(idx, 1);
          persist();
          render();
        });
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    el('addBtn').addEventListener('click', () => {
      const lineName = toFullWidth(el('lineName').value);
      const time = toFullWidth(el('time').value);
      const reason = toFullWidth(el('reason').value);
      const remark = toFullWidth(el('remark').value);
      const lineNameEn = trimSafe(el('lineNameEn').value); // 半角のまま
      const status = el('status').value;

      if (!lineName && !lineNameEn) {
        alert('路線名または路線名英語を入力してください。');
        return;
      }

      items.unshift({ lineName, lineNameEn, time, reason, remark, status });
      persist();
      render();

      el('lineName').value = '';
      el('lineNameEn').value = '';
      el('time').value = '';
      el('reason').value = '';
      el('remark').value = '';
      el('status').value = 'delay';
      el('lineName').focus();
    });

    el('clearAllBtn').addEventListener('click', () => {
      if (!items.length) return;
      if (confirm('すべて解除しますか？')) {
        items.length = 0;
        persist();
        render();
      }
    });

    el('downloadBtn').addEventListener('click', () => {
      const text = outputEl.value.trim();
      if (!text) {
        alert('出力する内容がありません。');
        return;
      }
      const blob = new Blob([text + '\n'], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'unkojoho.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    render();
  </script>
</body>
</html>
